name: Poll Deep Research Runs

on:
  schedule:
    # Poll during weekday EU/US trading hours to sync completed Parallel runs.
    - cron: "*/15 6-22 * * 1-5"
  workflow_dispatch:

jobs:
  poll-deep-research-runs:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
      NOTION_API_TOKEN: ${{ secrets.NOTION_API_TOKEN }}
      PARALLEL_API_KEY: ${{ secrets.PARALLEL_API_KEY }}
      PARALLEL_POLL_TIMEOUT: 540
      PARALLEL_POLL_LIMIT: 5

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Validate required secrets
        run: |
          test -n "$NOTION_API_TOKEN" || { echo "NOTION_API_TOKEN is missing"; exit 1; }
          test -n "$PARALLEL_API_KEY" || { echo "PARALLEL_API_KEY is missing"; exit 1; }

      - name: Install Parallel CLI
        run: |
          mkdir -p "$HOME/.local/bin" "$HOME/.local/share"
          curl -fsSL https://parallel.ai/install.sh | bash
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"

      - name: Poll running deep research runs
        run: bash .agents/skills/run-daily-macro-cycle-research/scripts/poll.sh
