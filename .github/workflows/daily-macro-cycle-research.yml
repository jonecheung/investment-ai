name: Daily Macro Cycle Research

on:
  # Schedule paused 2026-06-30 — redesigning intraday fundamental analysis pipeline.
  # Re-enable cron only after explicit review.
  workflow_dispatch:

jobs:
  run-macro-cycle-research:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
      NOTION_API_TOKEN: ${{ secrets.NOTION_API_TOKEN }}
      PARALLEL_API_KEY: ${{ secrets.PARALLEL_API_KEY }}
      PARALLEL_PROCESSOR: ultra
      PARALLEL_POLL_TIMEOUT: 1800
      PARALLEL_POLL_LIMIT: 5
      AUTO_CREATE_TRADING_PROPOSALS: 1
      FOLLOWUP_PROCESSOR: core
      MACRO_PROMPT_PATH: data/prompts/macro-cycle-regime-scan.md
      MACRO_RESEARCH_IDEA_TITLE: Daily Macro Cycle Regime Scan Before EU Session

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Validate required secrets
        run: |
          test -n "$NOTION_API_TOKEN" || { echo "NOTION_API_TOKEN is missing"; exit 1; }
          test -n "$PARALLEL_API_KEY" || { echo "PARALLEL_API_KEY is missing"; exit 1; }

      - name: Install Parallel CLI
        run: |
          set -euo pipefail
          mkdir -p "$HOME/.local/bin" "$HOME/.local/share"
          if ! curl -fsSL https://parallel.ai/install.sh | bash; then
            echo "::warning::Parallel install script failed; falling back to pipx"
            python3 -m pip install --user --upgrade pipx
            python3 -m pipx ensurepath
            python3 -m pipx install "parallel-web-tools[cli]"
          fi
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"
          "$HOME/.local/bin/parallel-cli" --version

      - name: Start scheduled macro-cycle research
        run: bash .agents/skills/run-daily-macro-cycle-research/scripts/run.sh

      - name: Poll, sync, and create trading proposals
        run: bash .agents/skills/run-daily-macro-cycle-research/scripts/poll.sh
